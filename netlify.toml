[build]
  command = "npm run build"
  publish = "dist"

# Force correct MIME types for JavaScript modules
[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "text/javascript; charset=utf-8"

[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Content-Type = "text/javascript; charset=utf-8"

[[headers]]
  for = "/*.mjs"
  [headers.values]
    Content-Type = "text/javascript; charset=utf-8"

[[headers]]
  for = "/src/*.tsx"
  [headers.values]
    Content-Type = "text/javascript; charset=utf-8"

[[headers]]
  for = "/src/*.ts"
  [headers.values]
    Content-Type = "text/javascript; charset=utf-8"

# Hashed assets: 1-year cache, immutable — safe because filenames change on content change
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service workers must never be cached — both main and intercity
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/intercity/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Intercity HTML — always revalidate so SW update is picked up immediately
[[headers]]
  for = "/intercity/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# HTML: serve immediately from cache, revalidate in background (30s fresh + 1h stale)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=30, stale-while-revalidate=3600"

# Root HTML (SPA shell)
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=30, stale-while-revalidate=3600"

# Static JSON data files: moderate cache
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

# Security headers — applied globally
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"

# Intercity sub-app — MUST come before /* catch-all.
# force=true overrides Netlify's built-in pretty-URL trailing-slash redirect
# so /intercity stays /intercity and never becomes /intercity/.
[[redirects]]
  from = "/intercity"
  to = "/intercity/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/intercity/"
  to = "/intercity/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/intercity/*"
  to = "/intercity/:splat"
  status = 200
  force = true

# SPA redirect - all other routes to main app index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
