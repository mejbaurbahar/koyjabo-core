name: Auth Handler

# This workflow acts as the secure backend for KoyJabo authentication.
# It is triggered by the frontend via workflow_dispatch through the GitHub API.
# All sensitive operations (bcrypt hashing, encryption, JWT) happen here,
# keeping secrets OUT of the browser.

on:
  workflow_dispatch:
    inputs:
      requestId:
        description: 'Unique request ID (UUID from the frontend)'
        required: true
        type: string
      action:
        description: 'Auth action'
        required: true
        type: choice
        options:
          - signup
          - update-profile
          - change-password
          - forgot-password
          - reset-password
          - record-device
          - logout-device
          - upload-avatar
      email:
        description: 'User email (masked in logs immediately)'
        required: false
        type: string
        default: ''
      passwordHash:
        description: 'SHA-256 pre-hashed password (never plaintext)'
        required: false
        type: string
        default: ''
      userId:
        description: 'User ID (for authenticated operations)'
        required: false
        type: string
        default: ''
      data:
        description: 'Additional JSON payload'
        required: false
        type: string
        default: '{}'

# Only write to contents; no other permissions needed
permissions:
  contents: write

# Prevent race conditions on shared data files
concurrency:
  group: auth-${{ github.event.inputs.userId || github.event.inputs.email || 'global' }}
  cancel-in-progress: false

jobs:
  auth:
    name: Process Auth Request
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AUTH_GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install auth script dependencies
        working-directory: .github/scripts
        run: npm install --production

      - name: Run auth handler
        working-directory: .github/scripts
        env:
          # Write-capable PAT (stored ONLY in GitHub Secrets, never in frontend)
          AUTH_GITHUB_TOKEN: ${{ secrets.AUTH_GITHUB_TOKEN }}
          # JWT signing secret (64+ random chars)
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          # AES-256 encryption key for emails at rest (32+ random chars)
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          # Optional: Gmail SMTP for password reset emails
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          # Your deployed app URL (for password reset links)
          APP_URL: ${{ secrets.APP_URL }}
          # GitHub provides this automatically
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Auth inputs
          INPUT_REQUESTID: ${{ inputs.requestId }}
          INPUT_ACTION: ${{ inputs.action }}
          INPUT_EMAIL: ${{ inputs.email }}
          INPUT_PASSWORDHASH: ${{ inputs.passwordHash }}
          INPUT_USERID: ${{ inputs.userId }}
          INPUT_DATA: ${{ inputs.data }}
        run: node auth-handler.js
