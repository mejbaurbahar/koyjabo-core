name: Auth Handler

on:
  workflow_dispatch:
    inputs:
      requestId:
        description: 'Request ID'
        required: true
        type: string
      action:
        description: 'Auth action'
        required: true
        type: string
      email:
        required: false
        type: string
        default: ''
      passwordHash:
        required: false
        type: string
        default: ''
      userId:
        required: false
        type: string
        default: ''
      data:
        required: false
        type: string
        default: '{}'

permissions:
  contents: write

concurrency:
  group: auth-${{ github.event.inputs.userId || github.event.inputs.email || 'global' }}
  cancel-in-progress: false

jobs:
  auth:
    name: Process Auth Request
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout auth scripts (private)
        uses: actions/checkout@v4
        with:
          repository: mejbaurbahar/koyjabo
          token: ${{ secrets.DATA_GITHUB_TOKEN }}
          path: _auth
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install auth script dependencies
        working-directory: _auth/.github/scripts
        run: npm install --production

      - name: Run auth handler
        working-directory: _auth/.github/scripts
        env:
          AUTH_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATA_GITHUB_TOKEN: ${{ secrets.DATA_GITHUB_TOKEN || secrets.DEPLOY_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          APP_URL: ${{ secrets.APP_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          INPUT_REQUESTID: "${{ github.event.inputs.requestId }}"
          INPUT_ACTION: "${{ github.event.inputs.action }}"
          INPUT_EMAIL: "${{ github.event.inputs.email }}"
          INPUT_PASSWORDHASH: "${{ github.event.inputs.passwordHash }}"
          INPUT_USERID: "${{ github.event.inputs.userId }}"
          INPUT_DATA: "${{ github.event.inputs.data }}"
        run: node auth-handler.js
