name: Build & Deploy to koyjabo.com

# Runs from koyjabo-core (private repo) → deploys built dist to Dhaka-Commute.
# Triggering fresh run to verify surgical sync.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write  # needed for GITHUB_TOKEN self-push (Dhaka-Commute → itself)

jobs:
  build-and-deploy:
    name: Build → Push to Dhaka-Commute
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout koyjabo-core
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production
          GENERATE_SOURCEMAP: false

      - name: Verify build output
        run: |
          if [ ! -f dist/index.html ]; then
            echo "ERROR: dist/index.html not found. Build may have failed."
            exit 1
          fi
          echo "Build OK — $(find dist -type f | wc -l) files"

      - name: Clone Dhaka-Commute (deploy target)
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use DEPLOY_TOKEN (koyjabo-core cross-repo) or fall back to GITHUB_TOKEN (Dhaka-Commute self-push)
          TOKEN="${DEPLOY_TOKEN:-$GH_TOKEN}"
          git clone \
            "https://x-access-token:${TOKEN}@github.com/mejbaurbahar/Dhaka-Commute.git" \
            deploy-repo

      - name: Swap dist content (preserve .github workflows)
        run: |
          cd deploy-repo

          # Remove all git-tracked files EXCEPT workflows
          git ls-files | grep -v '^\.github/workflows/' | xargs rm -f 2>/dev/null || true

          # Remove leftover empty directories (skip .git and .github/workflows)
          find . \
            -not -path './.git*' \
            -not -path './.github/workflows*' \
            -type d -empty -delete 2>/dev/null || true

          # Copy new build output
          cp -r ../dist/. .

          # Full Sync: Copy .github folder from core to target.
          # This works now because DEPLOY_TOKEN has 'workflow' scope.
          cp -r ../.github .

          # Ensure domain and Jekyll bypass are always present
          echo "koyjabo.com" > CNAME
          touch .nojekyll

      - name: Commit and push
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd deploy-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TOKEN="${DEPLOY_TOKEN:-$GH_TOKEN}"
          git remote set-url origin \
            "https://x-access-token:${TOKEN}@github.com/mejbaurbahar/Dhaka-Commute.git"

          git add -A

          # Skip commit if nothing changed
          if git diff --cached --quiet; then
            echo "Nothing changed — skipping deploy"
            exit 0
          fi

          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M UTC') | core@${SHORT_SHA}"
          git push origin main

      - name: Deploy summary
        if: success()
        run: |
          echo "### Deployed to koyjabo.com" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://koyjabo.com" >> $GITHUB_STEP_SUMMARY
