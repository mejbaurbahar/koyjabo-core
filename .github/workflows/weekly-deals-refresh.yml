name: Weekly Deals Refresh

# Runs every Monday at 9:00 AM BDT (= 3:00 UTC).
# Updates _updated timestamp in deals.json and commits to dev + main.
# To add new deals: edit public/deals.json and push — this workflow keeps _updated current.
on:
  schedule:
    - cron: '0 3 * * 1'   # Monday 03:00 UTC = 9:00 AM BDT
  workflow_dispatch:       # manual trigger from GitHub Actions UI

concurrency:
  group: deals-refresh
  cancel-in-progress: false

jobs:
  refresh-deals:
    name: Refresh Deals Timestamp
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update _updated timestamp in deals.json
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          node -e "
            const fs = require('fs');
            const path = './public/deals.json';
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            data._updated = '$DATE';
            fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
            console.log('Updated _updated to $DATE, deals count:', data.deals.length);
          "

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet public/deals.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push to main
        if: steps.diff.outputs.changed == 'true'
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          COUNT=$(node -e "const d=JSON.parse(require('fs').readFileSync('./public/deals.json','utf8')); console.log(d.deals.length)")
          git config user.name  "KoyJabo Deals Bot"
          git config user.email "deals-bot@koyjabo.com"
          git add public/deals.json
          git commit -m "chore(deals): weekly refresh ${DATE} — ${COUNT} active deals"
          git push origin main

      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "✅ Deals already up to date."
