name: Delete Test Users (One-Time Admin)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  delete-users:
    name: Delete Test Accounts
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: .github/scripts
        run: npm install --production

      - name: Run delete script
        working-directory: .github/scripts
        env:
          DATA_GITHUB_TOKEN: ${{ secrets.DATA_GITHUB_TOKEN }}
        run: node delete-users.js
