name: Weekly Transport Data Refresh

# Runs every Sunday at 8:00 PM BDT (= 14:00 UTC).
# Creates a PR to dev with updated transport-cache.json — no auto-merge.
on:
  schedule:
    - cron: '0 14 * * 0'    # Sunday 14:00 UTC = 8:00 PM BDT
  workflow_dispatch:

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh-data:
    name: Refresh Bangladesh Transport Data
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run transport data refresh
        run: node scripts/refresh-transport-data.mjs
        env:
          GITHUB_ACTIONS: 'true'
          NODE_NO_WARNINGS: '1'

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet data/transport-cache.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create branch and open PR
        if: steps.diff.outputs.changed == 'true'
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          BRANCH="data/weekly-refresh-${DATE}"

          git config user.name  "KoyJabo Data Bot"
          git config user.email "data-bot@koyjabo.com"
          git checkout -b "$BRANCH"
          git add data/transport-cache.json

          TRAIN=$(node -e "try{const d=require('./data/transport-cache.json');console.log(d.trainRoutes?.routes?.length||0)}catch{console.log(0)}")
          LAUNCH=$(node -e "try{const d=require('./data/transport-cache.json');console.log(d.launchRoutes?.routes?.length||0)}catch{console.log(0)}")
          git commit -m "chore(data): weekly refresh ${DATE} — ${TRAIN} trains, ${LAUNCH} launches"
          git push origin "$BRANCH"

          PR_BODY="## Weekly Data Refresh

Automated refresh of \`data/transport-cache.json\` from official sources.

Sources updated: Bangladesh Railway, DMTCL Metro, BRTA bus fares, BIWTC launches.

**Review:** Check the diff in \`data/transport-cache.json\` for unexpected fare or schedule changes before merging.

> _Generated by \`.github/workflows/weekly-data-refresh.yml\`_"

          gh pr create \
            --base dev \
            --head "$BRANCH" \
            --title "chore(data): weekly transport data refresh ${DATE}" \
            --body "$PR_BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "✅ Transport data already up to date — no PR needed."
